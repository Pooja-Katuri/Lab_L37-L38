<!DOCTYPE html>
<html>
<head>
    <title>Course Enrollment</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            width: 320px;
            text-align: center;
            color: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        button {
            padding: 10px 15px;
            margin: 10px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 10px #ff4b2b;
        }

        #output {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>🎓 Course Enrollment</h2>

    <input type="text" id="course" placeholder="Course Name">
    <input type="text" id="instructor" placeholder="Instructor Name">
    <input type="number" id="seats" placeholder="Available Seats">

    <br>

    <button onclick="showCourse()">Show</button>
    <button onclick="enroll()">Enroll</button>

    <div id="output"></div>
</div>

<script src="Exercise_3.js" defer></script>

</body>
</html>
