<!DOCTYPE html>
<html>
<head>
    <title>Student Marks Calculator</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #e14ffe, #00dcfe);
            text-align: center;
        }

        .container {
            background: white;
            padding: 50px;
            margin: 80px auto;
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid gray;
        }

        button {
            padding: 10px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            background-color: #0e599a;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #007bff;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Marks Calculator</h2>

    <input type="text" id="name" placeholder="Enter Name"><br>
    <input type="number" id="m1" placeholder="Mark 1"><br>
    <input type="number" id="m2" placeholder="Mark 2"><br>
    <input type="number" id="m3" placeholder="Mark 3"><br>

    <button onclick="calculateTotal()">Total</button>
    <button onclick="calculateAverage()">Average</button>

    <div id="result"></div>
</div>

<script src="Exercise-1.js"></script>

</body>
</html>
